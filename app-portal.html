<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>社内アプリポータル</title>
<style>
:root{
  --primary:#2563eb;--primary-dark:#1e40af;
  --accent:#7c3aed;
  --green:#10b981;--yellow:#f59e0b;--red:#ef4444;--teal:#0f766e;--orange:#f97316;--pink:#ec4899;--indigo:#6366f1;--cyan:#06b6d4;
  --gray50:#f8fafc;--gray100:#f1f5f9;--gray200:#e2e8f0;--gray300:#cbd5e1;--gray400:#94a3b8;--gray500:#64748b;--gray700:#334155;--gray900:#0f172a;
  --shadow:0 2px 8px rgba(0,0,0,.08);--shadow-lg:0 8px 30px rgba(0,0,0,.12);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Segoe UI','Hiragino Sans','Noto Sans JP',sans-serif;background:var(--gray100);color:var(--gray900);min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none;outline:none}

/* ====== LOGIN ====== */
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 30%,#2563eb 65%,#7c3aed 100%);position:relative;overflow:hidden}
#login::before{content:'';position:absolute;top:-100px;right:-100px;width:400px;height:400px;border-radius:50%;background:rgba(124,58,237,.15)}
#login::after{content:'';position:absolute;bottom:-80px;left:-80px;width:300px;height:300px;border-radius:50%;background:rgba(37,99,235,.12)}
.login-card{background:#fff;border-radius:24px;padding:52px 44px;width:420px;box-shadow:0 25px 65px rgba(0,0,0,.35);text-align:center;position:relative;z-index:1;animation:fadeIn .4s ease-out}
.login-logo{width:80px;height:80px;border-radius:20px;background:linear-gradient(135deg,var(--primary),var(--accent));margin:0 auto 24px;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;font-weight:900;box-shadow:0 8px 24px rgba(37,99,235,.3);letter-spacing:1px}
.login-input{width:100%;padding:14px 20px;border-radius:14px;border:2px solid var(--gray200);font-size:16px;text-align:center;letter-spacing:3px;box-sizing:border-box;transition:all .2s;outline:none}
.login-input:focus{border-color:var(--primary);box-shadow:0 0 0 4px rgba(37,99,235,.1)}
.login-btn{width:100%;padding:14px;border-radius:14px;background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;font-size:16px;font-weight:700;box-shadow:0 6px 20px rgba(37,99,235,.35);transition:all .2s}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(37,99,235,.45)}

/* ====== MAIN ====== */
.header{background:linear-gradient(135deg,var(--primary-dark) 0%,var(--primary) 60%,#4f7df5 100%);color:#fff;padding:0 32px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(30,64,175,.25)}
.header-logo{width:38px;height:38px;border-radius:10px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;backdrop-filter:blur(4px)}
.logout-btn{padding:8px 14px;border-radius:10px;border:1.5px solid rgba(255,255,255,.25);background:transparent;color:#fff;font-size:11px;font-weight:600;transition:all .2s}
.logout-btn:hover{background:rgba(255,255,255,.1)}

.container{padding:32px;max-width:1200px;margin:0 auto}

/* Stats */
.stats{display:flex;gap:16px;margin-bottom:32px;flex-wrap:wrap}
.stat-card{background:#fff;border-radius:16px;padding:20px 24px;box-shadow:var(--shadow);flex:1 1 180px;min-width:160px;position:relative;overflow:hidden;transition:all .2s}
.stat-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.stat-bar{position:absolute;top:0;left:0;width:4px;height:100%;border-radius:4px 0 0 4px}

/* App Grid */
.app-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin-bottom:32px}
.app-card{background:#fff;border-radius:20px;padding:0;box-shadow:var(--shadow);overflow:hidden;transition:all .25s;border:1px solid rgba(0,0,0,.04);cursor:pointer;position:relative}
.app-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.app-card-top{padding:24px 24px 16px;position:relative}
.app-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;font-weight:800;box-shadow:0 4px 12px rgba(0,0,0,.15);margin-bottom:14px}
.app-title{font-size:17px;font-weight:800;margin-bottom:4px}
.app-desc{font-size:12px;color:var(--gray500);line-height:1.5}
.app-card-bottom{padding:12px 24px;background:var(--gray50);border-top:1px solid var(--gray100);display:flex;justify-content:space-between;align-items:center}
.app-badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;color:#fff}
.app-arrow{width:28px;height:28px;border-radius:50%;background:var(--gray100);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--gray400);transition:all .2s}
.app-card:hover .app-arrow{background:var(--primary);color:#fff}

/* Admin section */
.admin-section{background:#fff;border-radius:20px;padding:28px;box-shadow:var(--shadow);margin-top:32px}
.admin-section h3{font-size:18px;font-weight:800;margin-bottom:16px;color:var(--gray700)}
.admin-table{width:100%;border-collapse:collapse;font-size:13px}
.admin-table th{padding:12px;text-align:left;font-weight:700;color:var(--gray500);border-bottom:2px solid var(--gray200);font-size:11px;text-transform:uppercase;letter-spacing:.5px}
.admin-table td{padding:10px 12px;border-bottom:1px solid var(--gray100)}
.admin-table tr:hover td{background:var(--gray50)}
.admin-table input,.admin-table select{padding:7px 10px;border-radius:8px;border:1.5px solid var(--gray200);font-size:12px;width:100%;box-sizing:border-box;transition:border-color .2s}
.admin-table input:focus,.admin-table select:focus{border-color:var(--primary);outline:none;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;font-weight:600;font-size:12px;transition:all .2s}
.btn:hover{transform:translateY(-1px)}
.btn-primary{background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(37,99,235,.25)}
.btn-ghost{background:transparent;color:var(--gray500);border:1.5px solid var(--gray200)}
.btn-danger{background:var(--red);color:#fff;font-size:11px;padding:5px 10px;border-radius:6px}
.btn-sm{padding:5px 10px;font-size:11px;border-radius:6px}

.hidden{display:none !important}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.animate-in{animation:fadeIn .3s ease-out}

/* Color picker mini */
.color-dot{width:20px;height:20px;border-radius:6px;display:inline-block;cursor:pointer;border:2px solid transparent;transition:all .15s}
.color-dot:hover,.color-dot.active{border-color:var(--gray900);transform:scale(1.15)}

.overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.active{opacity:1;pointer-events:auto}
.modal{background:#fff;border-radius:20px;padding:32px;max-width:560px;width:92%;max-height:90vh;overflow-y:auto;box-shadow:0 25px 65px rgba(0,0,0,.25);transform:scale(.96);transition:transform .25s}
.overlay.active .modal{transform:scale(1)}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-card">
    <div class="login-logo">PORTAL</div>
    <h1 style="font-size:22px;font-weight:800;margin-bottom:6px">社内アプリポータル</h1>
    <p style="font-size:13px;color:var(--gray400);margin-bottom:32px">管理画面にログインしてください</p>
    <input type="password" id="pw-input" class="login-input" placeholder="管理パスワード" onkeydown="if(event.key==='Enter')tryLogin()">
    <div id="pw-error" style="color:var(--red);font-size:12px;font-weight:600;height:22px;line-height:22px;margin:8px 0"></div>
    <button class="login-btn" onclick="tryLogin()">ログイン</button>
    <div style="font-size:11px;color:var(--gray300);margin-top:20px;letter-spacing:1px">AUTHORIZED PERSONNEL ONLY</div>
  </div>
</div>

<!-- MAIN -->
<div id="app" class="hidden">
  <div class="header">
    <div style="display:flex;align-items:center;gap:14px">
      <div class="header-logo">P</div>
      <div>
        <h1 style="font-size:16px;font-weight:700">社内アプリポータル</h1>
        <div style="font-size:10px;opacity:.7">管理ツール一覧</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <button class="btn" id="toggle-admin" onclick="toggleAdmin()" style="background:rgba(255,255,255,.12);color:#fff;font-size:11px">管理モード</button>
      <button class="logout-btn" onclick="logout()">ログアウト</button>
    </div>
  </div>

  <div class="container">
    <div class="stats" id="stats-area"></div>
    <div class="app-grid" id="app-grid"></div>

    <!-- Admin Panel -->
    <div id="admin-panel" class="admin-section hidden">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
        <h3 style="margin:0">アプリ管理</h3>
        <button class="btn btn-primary" onclick="openAddApp()">＋ アプリ追加</button>
      </div>
      <table class="admin-table">
        <thead><tr><th>アイコン</th><th>アプリ名</th><th>URL / ファイル名</th><th>カテゴリ</th><th>説明</th><th style="width:100px">操作</th></tr></thead>
        <tbody id="admin-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Modal -->
<div id="modal-overlay" class="overlay" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()" id="modal-body"></div>
</div>

<script>
const ADMIN_PASSWORD = "admin";
const STORAGE_KEY = "portal_apps_v2";
const ICON_COLORS = ["#2563eb","#7c3aed","#10b981","#f59e0b","#ef4444","#0f766e","#f97316","#ec4899","#6366f1","#06b6d4","#8b5cf6","#0ea5e9"];
const ICON_LIST = ["📊","📋","🏢","👥","📦","🔧","📈","🗓","💰","📝","🎯","⚙️","🔍","📁","🏥","💼","🛒","📞","🎓","🔑"];
const CATEGORIES = ["管理","研修","営業","人事","経理","その他"];
const esc=s=>s?s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"):"";

const DEFAULT_APPS = [
  { id:1, name:"GR プログラム導入管理", url:"gr-management.html", icon:"📊", color:"#2563eb", category:"研修", desc:"全10種プログラムの導入状況・スキルアップ研修スケジュール管理" },
  { id:2, name:"GR B2B 店舗管理", url:"GR_B2B_v66.html", icon:"🏢", color:"#7c3aed", category:"管理", desc:"B2B店舗の導入状況・進捗管理ダッシュボード" },
];

let APPS;
try{const s=localStorage.getItem(STORAGE_KEY);APPS=s?JSON.parse(s):JSON.parse(JSON.stringify(DEFAULT_APPS));}
catch(e){APPS=JSON.parse(JSON.stringify(DEFAULT_APPS));}
const saveApps=()=>{try{localStorage.setItem(STORAGE_KEY,JSON.stringify(APPS));}catch(e){}};

let adminMode = false;

function tryLogin(){
  const pw=document.getElementById("pw-input").value;
  if(pw===ADMIN_PASSWORD){document.getElementById("login").classList.add("hidden");document.getElementById("app").classList.remove("hidden");render();}
  else{document.getElementById("pw-error").textContent="パスワードが正しくありません";document.getElementById("pw-input").style.borderColor="var(--red)";setTimeout(()=>{document.getElementById("pw-error").textContent="";document.getElementById("pw-input").style.borderColor="var(--gray200)";},2000);}
}
function logout(){document.getElementById("app").classList.add("hidden");document.getElementById("login").classList.remove("hidden");document.getElementById("pw-input").value="";}

function toggleAdmin(){
  adminMode=!adminMode;
  document.getElementById("admin-panel").classList.toggle("hidden",!adminMode);
  document.getElementById("toggle-admin").style.background=adminMode?"rgba(255,255,255,.3)":"rgba(255,255,255,.12)";
  if(adminMode) renderAdmin();
}

function render(){
  // Stats
  const cats={};APPS.forEach(a=>{cats[a.category]=(cats[a.category]||0)+1;});
  let statsH=`<div class="stat-card"><div class="stat-bar" style="background:var(--primary)"></div><div style="font-size:12px;color:var(--gray500);font-weight:600">総アプリ数</div><div style="font-size:32px;font-weight:800;color:var(--primary);margin:4px 0">${APPS.length}</div></div>`;
  Object.entries(cats).forEach(([cat,cnt],i)=>{
    const col=ICON_COLORS[i%ICON_COLORS.length];
    statsH+=`<div class="stat-card"><div class="stat-bar" style="background:${col}"></div><div style="font-size:12px;color:var(--gray500);font-weight:600">${esc(cat)}</div><div style="font-size:32px;font-weight:800;color:${col};margin:4px 0">${cnt}</div></div>`;
  });
  document.getElementById("stats-area").innerHTML=statsH;

  // App Grid
  let gridH="";
  APPS.forEach(app=>{
    gridH+=`<div class="app-card animate-in" onclick="window.open('${esc(app.url)}','_blank')">
      <div class="app-card-top">
        <div class="app-icon" style="background:linear-gradient(135deg,${app.color},${app.color}cc)">${app.icon}</div>
        <div class="app-title">${esc(app.name)}</div>
        <div class="app-desc">${esc(app.desc)}</div>
      </div>
      <div class="app-card-bottom">
        <span class="app-badge" style="background:${app.color}20;color:${app.color}">${esc(app.category)}</span>
        <div class="app-arrow">→</div>
      </div>
    </div>`;
  });
  document.getElementById("app-grid").innerHTML=gridH;

  if(adminMode) renderAdmin();
}

function renderAdmin(){
  let h="";
  APPS.forEach(app=>{
    h+=`<tr>
      <td><div style="width:36px;height:36px;border-radius:10px;background:${app.color};display:flex;align-items:center;justify-content:center;font-size:18px">${app.icon}</div></td>
      <td style="font-weight:700">${esc(app.name)}</td>
      <td style="font-size:11px;color:var(--gray500);word-break:break-all;max-width:200px">${esc(app.url)}</td>
      <td><span class="app-badge" style="background:${app.color}20;color:${app.color}">${esc(app.category)}</span></td>
      <td style="font-size:11px;color:var(--gray500);max-width:200px">${esc(app.desc)}</td>
      <td>
        <div style="display:flex;gap:4px">
          <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();openEditApp(${app.id})">編集</button>
          <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deleteApp(${app.id})">削除</button>
        </div>
      </td>
    </tr>`;
  });
  document.getElementById("admin-tbody").innerHTML=h;
}

function openAddApp(){openAppForm(null);}
function openEditApp(id){openAppForm(APPS.find(a=>a.id===id));}

function openAppForm(app){
  const isNew=!app;
  if(!app) app={id:0,name:"",url:"",icon:"📊",color:"#2563eb",category:"その他",desc:""};
  let h=`<h2 style="font-size:20px;font-weight:800;margin-bottom:20px">${isNew?"アプリ追加":"アプリ編集"}</h2>
  <form id="app-form" onsubmit="return false">
    <div style="margin-bottom:14px"><label style="display:block;font-size:12px;font-weight:700;color:var(--gray500);margin-bottom:4px">アプリ名</label><input name="name" value="${esc(app.name)}" style="width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid var(--gray200);font-size:14px;box-sizing:border-box" required></div>
    <div style="margin-bottom:14px"><label style="display:block;font-size:12px;font-weight:700;color:var(--gray500);margin-bottom:4px">URL / ファイル名</label><input name="url" value="${esc(app.url)}" placeholder="例: gr-management.html または https://..." style="width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid var(--gray200);font-size:14px;box-sizing:border-box" required></div>
    <div style="margin-bottom:14px"><label style="display:block;font-size:12px;font-weight:700;color:var(--gray500);margin-bottom:4px">説明</label><input name="desc" value="${esc(app.desc)}" style="width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid var(--gray200);font-size:14px;box-sizing:border-box"></div>
    <div style="margin-bottom:14px"><label style="display:block;font-size:12px;font-weight:700;color:var(--gray500);margin-bottom:4px">カテゴリ</label><select name="category" style="padding:10px 14px;border-radius:10px;border:1.5px solid var(--gray200);font-size:14px">${CATEGORIES.map(c=>`<option ${c===app.category?"selected":""}>${c}</option>`).join("")}</select></div>
    <div style="margin-bottom:14px">
      <label style="display:block;font-size:12px;font-weight:700;color:var(--gray500);margin-bottom:8px">アイコン</label>
      <div style="display:flex;gap:6px;flex-wrap:wrap">${ICON_LIST.map(ic=>`<div class="color-dot ${ic===app.icon?"active":""}" style="width:36px;height:36px;border-radius:10px;background:var(--gray50);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer" onclick="selectIcon(this,'${ic}')" data-icon="${ic}">${ic}</div>`).join("")}</div>
      <input type="hidden" name="icon" value="${app.icon}" id="sel-icon">
    </div>
    <div style="margin-bottom:18px">
      <label style="display:block;font-size:12px;font-weight:700;color:var(--gray500);margin-bottom:8px">カラー</label>
      <div style="display:flex;gap:6px;flex-wrap:wrap">${ICON_COLORS.map(c=>`<div class="color-dot ${c===app.color?"active":""}" style="background:${c}" onclick="selectColor(this,'${c}')" data-color="${c}"></div>`).join("")}</div>
      <input type="hidden" name="color" value="${app.color}" id="sel-color">
    </div>
    <div style="display:flex;justify-content:flex-end;gap:10px">
      <button type="button" class="btn btn-ghost" onclick="closeModal()">キャンセル</button>
      <button type="button" class="btn btn-primary" style="padding:10px 28px" onclick="saveApp(${app.id},${isNew})">${isNew?"追加":"保存"}</button>
    </div>
  </form>`;
  showModal(h);
}

function selectIcon(el,icon){
  document.querySelectorAll('[data-icon]').forEach(d=>d.classList.remove("active"));
  el.classList.add("active");
  document.getElementById("sel-icon").value=icon;
}
function selectColor(el,color){
  document.querySelectorAll('[data-color]').forEach(d=>d.classList.remove("active"));
  el.classList.add("active");
  document.getElementById("sel-color").value=color;
}

function saveApp(id,isNew){
  const fd=new FormData(document.getElementById("app-form"));
  const obj={};fd.forEach((v,k)=>obj[k]=v);
  if(isNew){obj.id=Math.max(...APPS.map(a=>a.id),0)+1;APPS.push(obj);}
  else{const i=APPS.findIndex(a=>a.id===id);if(i>=0)APPS[i]={...APPS[i],...obj};}
  saveApps();closeModal();render();
}

function deleteApp(id){
  const app=APPS.find(a=>a.id===id);if(!app)return;
  showModal(`<div style="text-align:center;padding:20px 0">
    <div style="width:56px;height:56px;border-radius:50%;background:var(--red)10;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:24px">⚠</div>
    <h3 style="font-size:18px;font-weight:800;margin-bottom:8px">削除確認</h3>
    <p style="color:var(--gray500)">「${esc(app.name)}」を削除しますか？</p>
    <div style="display:flex;justify-content:center;gap:10px;margin-top:20px">
      <button class="btn btn-ghost" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-danger" style="padding:8px 20px" onclick="doDeleteApp(${id})">削除する</button>
    </div></div>`);
}
function doDeleteApp(id){APPS.splice(APPS.findIndex(a=>a.id===id),1);saveApps();closeModal();render();}

function showModal(html){document.getElementById("modal-body").innerHTML=html;document.getElementById("modal-overlay").classList.add("active");}
function closeModal(){document.getElementById("modal-overlay").classList.remove("active");}
</script>
</body>
</html>
