<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUI — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --black: #f5f2ee;
  --dark: #ede8de;
  --panel: #fdfcfa;
  --gold: #a07a40;
  --gold-dim: rgba(160,122,64,.20);
  --cream: #3F3931;
  --warm: #6a6258;
  --muted: #8a8278;
  --border: rgba(160,122,64,.22);
  --serif: 'Cormorant Garamond','Noto Serif JP',serif;
  --sans: 'Noto Sans JP',sans-serif;
  --error: #c45a4a;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--sans);
  background: var(--black);
  color: var(--cream);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-font-smoothing: antialiased;
}

/* ── Background pattern ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(160,122,64,.06) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 30%, rgba(160,122,64,.04) 0%, transparent 50%);
  pointer-events: none;
}

.login-container {
  position: relative;
  width: 100%;
  max-width: 420px;
  padding: 20px;
}

.login-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 56px 44px 48px;
  box-shadow:
    0 4px 24px rgba(0,0,0,.04),
    0 1px 3px rgba(0,0,0,.02);
  text-align: center;
}

/* ── Logo ── */
.logo {
  font-family: var(--serif);
  font-weight: 700;
  font-size: 42px;
  color: var(--gold);
  letter-spacing: 12px;
  margin-bottom: 6px;
  text-indent: 12px;
}

.logo-sub {
  font-family: var(--sans);
  font-weight: 300;
  font-size: 10px;
  color: var(--warm);
  letter-spacing: 3px;
  margin-bottom: 40px;
}

/* ── Divider ── */
.divider {
  width: 40px;
  height: 1px;
  background: var(--gold);
  opacity: .4;
  margin: 28px auto 32px;
}

/* ── Form ── */
.form-group {
  margin-bottom: 20px;
  text-align: left;
}

.form-label {
  display: block;
  font-size: 10px;
  font-weight: 500;
  color: var(--muted);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.form-input {
  width: 100%;
  padding: 14px 18px;
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 300;
  color: var(--cream);
  background: var(--black);
  border: 1px solid var(--border);
  border-radius: 10px;
  outline: none;
  transition: border-color .3s, box-shadow .3s;
}

.form-input:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px var(--gold-dim);
}

.form-input::placeholder {
  color: var(--muted);
  font-weight: 300;
}

/* ── Button ── */
.login-btn {
  width: 100%;
  padding: 15px;
  margin-top: 12px;
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--panel);
  background: var(--gold);
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: all .3s;
}

.login-btn:hover {
  background: #b08a50;
  box-shadow: 0 4px 16px rgba(160,122,64,.3);
  transform: translateY(-1px);
}

.login-btn:active {
  transform: translateY(0);
}

/* ── Error message ── */
.error-msg {
  font-size: 12px;
  color: var(--error);
  margin-top: 14px;
  min-height: 18px;
  opacity: 0;
  transition: opacity .3s;
}

.error-msg.show {
  opacity: 1;
}

/* ── Footer ── */
.login-footer {
  margin-top: 32px;
  font-size: 9px;
  color: var(--muted);
  letter-spacing: .5px;
}

/* ── Shake animation ── */
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-5px); }
  80% { transform: translateX(5px); }
}

.shake {
  animation: shake .4s ease;
}

/* ── Fade in ── */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.login-card {
  animation: fadeIn .6s ease;
}

/* ── Responsive ── */
@media (max-width: 480px) {
  .login-card {
    padding: 44px 28px 40px;
    border-radius: 12px;
  }
  .logo { font-size: 34px; letter-spacing: 8px; text-indent: 8px; }
}
</style>
</head>
<body>

<div class="login-container">
  <div class="login-card" id="loginCard">
    <div class="logo">SUI</div>
    <div class="logo-sub">pilates studio</div>
    <div class="divider"></div>

    <form id="loginForm" onsubmit="return handleLogin(event)">
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input
          class="form-input"
          type="password"
          id="password"
          placeholder="パスワードを入力"
          autocomplete="off"
          autofocus
        >
      </div>

      <button class="login-btn" type="submit">Enter</button>

      <div class="error-msg" id="errorMsg">パスワードが正しくありません</div>
    </form>

    <div class="login-footer">Staff Only &mdash; Authorized Access</div>
  </div>
</div>

<script>
// パスワードのハッシュ（SHA-256）
// 実際のパスワードはコードに直接書かず、ハッシュで照合します
const VALID_HASH = null; // 後で設定

// 簡易SHA-256ハッシュ
async function sha256(text) {
  const encoder = new TextEncoder();
  const data = encoder.encode(text);
  const hash = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// 先にハッシュを生成して設定するための初期化
// パスワード: 先ほど生成したものから選択可能
const PASSWORD = 'SUIP';

async function handleLogin(e) {
  e.preventDefault();
  const input = document.getElementById('password').value;
  const errorMsg = document.getElementById('errorMsg');
  const card = document.getElementById('loginCard');

  if (input === PASSWORD) {
    // ログイン成功 → マスタープランへ遷移
    errorMsg.classList.remove('show');
    document.body.style.opacity = '0';
    document.body.style.transition = 'opacity .4s';
    setTimeout(() => {
      window.location.href = 'SUI_Master_Plan_20260321.html';
    }, 400);
  } else {
    // エラー表示
    errorMsg.classList.add('show');
    card.classList.remove('shake');
    void card.offsetWidth; // reflow
    card.classList.add('shake');
    document.getElementById('password').value = '';
    document.getElementById('password').focus();
  }
}

// Enterキー対応
document.getElementById('password').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    handleLogin(e);
  }
});
</script>

</body>
</html>
